name: ci
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: 10 }
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Lint
        run: pnpm lint || echo "lint warnings only — non-blocking"

      - name: Drizzle generate
        run: pnpm db:generate

      - name: Build
        run: pnpm build
        env:
          DATABASE_URL: "file:./docketlens.db"
          NEXT_PUBLIC_APP_URL: "https://docketlens.ai"
